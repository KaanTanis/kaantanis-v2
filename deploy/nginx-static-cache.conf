# kaantanis.com — statik asset cache (server bloğuna include edin)
# Örnek: include /var/www/kaantanis-v2/deploy/nginx-static-cache.conf;

location ~* ^/_astro/.+\.(css|js)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri @proxy;
}

location ~* \.(woff2|webp|svg|ico|png|jpg|jpeg)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri @proxy;
}

location /fonts/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri @proxy;
}

location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri @proxy;
}
